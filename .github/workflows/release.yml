name: Release

# One-shot auto-release.
#
# Every push to `main` (i.e. every merged PR) does the following in one job:
#
#   1. Read the most recent SemVer tag (e.g. v0.4.3). If none exists, start at
#      v0.0.0.
#   2. Decide the bump from the merged PR's title (squash-merge commit) using
#      Conventional Commits:
#        - "feat!: ..."        or  body contains "BREAKING CHANGE"  → major
#        - "feat: ..."                                              → minor
#        - anything else (fix:, docs:, chore:, refactor:, ci:, …)   → patch
#   3. Compute the next version, create an annotated tag, push it.
#   4. Create a GitHub Release whose body is the auto-generated commit log
#      between the previous tag and the new one (`gh release create
#      --generate-notes`).
#
# No release PRs. No manifest files. One merge → one tag → one release.

on:
  push:
    branches:
      - main

permissions:
  contents: write   # required to push tags and create releases

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: tag-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          # Most recent SemVer tag, or v0.0.0 if the repo has never been tagged.
          PREV_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG="v0.0.0"
          fi
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          # Strip leading v for arithmetic.
          PREV="${PREV_TAG#v}"
          MAJOR="${PREV%%.*}"
          REST="${PREV#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"

          # First line of the push's head commit message — for a squash-merged
          # PR this is the PR title.
          FIRST_LINE="$(printf '%s' "$COMMIT_MSG" | head -n1)"
          echo "Commit subject: $FIRST_LINE"

          # Decide bump.
          if printf '%s' "$COMMIT_MSG" | grep -qE 'BREAKING CHANGE' \
             || printf '%s' "$FIRST_LINE" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:'; then
            BUMP="major"
          elif printf '%s' "$FIRST_LINE" | grep -qE '^feat(\([^)]*\))?:'; then
            BUMP="minor"
          else
            BUMP="patch"
          fi
          echo "Bump: $BUMP"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Previous: $PREV_TAG  →  Next: $NEXT_TAG ($BUMP)"

      - name: Create tag
        env:
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEXT_TAG" -m "$NEXT_TAG"
          git push origin "$NEXT_TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
          PREV_TAG: ${{ steps.bump.outputs.prev_tag }}
        run: |
          set -euo pipefail
          # --generate-notes builds the body from PRs/commits between the
          # previous tag and the new one (GitHub's "Automatically generated
          # release notes" feature). --notes-start-tag scopes that diff to
          # the actual previous release tag so the notes are clean.
          if [ "$PREV_TAG" = "v0.0.0" ]; then
            gh release create "$NEXT_TAG" \
              --title "$NEXT_TAG" \
              --generate-notes
          else
            gh release create "$NEXT_TAG" \
              --title "$NEXT_TAG" \
              --generate-notes \
              --notes-start-tag "$PREV_TAG"
          fi

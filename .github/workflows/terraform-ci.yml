name: Terraform CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  terraform:
    name: fmt-validate-lint-security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Docs Check (root)
        uses: terraform-docs/gh-actions@v1.4.1
        with:
          working-dir: .
          config-file: .terraform-docs.yml
          output-file: README.md
          output-method: inject
          git-push: "false"
          fail-on-diff: "true"

      - name: Terraform Docs Check (basic example)
        uses: terraform-docs/gh-actions@v1.4.1
        with:
          working-dir: examples/basic
          config-file: ../../.terraform-docs.yml
          output-file: README.md
          output-method: inject
          git-push: "false"
          fail-on-diff: "true"

      - name: Terraform Docs Check (existing VPC example)
        uses: terraform-docs/gh-actions@v1.4.1
        with:
          working-dir: examples/existing-vpc
          config-file: ../../.terraform-docs.yml
          output-file: README.md
          output-method: inject
          git-push: "false"
          fail-on-diff: "true"

      - name: Terraform Test
        run: terraform test

      - name: Test Agent Bootstrap Render
        run: python3 tests/test_agent_bootstrap_render.py

      - name: Validate Examples
        run: |
          set -euo pipefail
          for dir in examples/*; do
            [ -d "$dir" ] || continue
            echo "==> $dir"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint --recursive --config "$(pwd)/.tflint.hcl"

      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          skip-dirs: ".terraform"
          hide-progress: true

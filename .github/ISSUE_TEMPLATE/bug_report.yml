name: Bug report
description: Report a problem with the Terraform module.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Module ref:
        Terraform version:
        AWS region:
        delegation_enabled:
  - type: textarea
    id: plan
    attributes:
      label: Relevant plan/log output
      description: Redact secrets before posting.

